version: 2

registries:
  github-pagopa:
    type: maven-repository
    url: https://maven.pkg.github.com/pagopa
    username: "mil-github-bot"
    password: ${{secrets.MIL_BOT_TOKEN}}

updates:
  - package-ecosystem: "maven"
    directory: "/"
    registries: "*"
    schedule:
      interval: "monthly"