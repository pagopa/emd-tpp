name: Depcheck

# Reusable workflow — invoked by pr-pipeline.yml.
# Regenerates dep-sha256.json to match pom.xml and commits it back to the PR branch.
# Push is performed only for same-repo PRs (forks have a read-only token / no secrets).

on:
  workflow_call:

permissions:
  contents: write

jobs:
  depcheck:
    name: 🔄 Update dep-sha256.json
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout PR head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.EMD_BOT_RW_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Maven Settings
        run: |
          mkdir -p ~/.m2
          echo '<settings><servers><server><id>github</id><username></username><password>${{ secrets.GITHUB_TOKEN }}</password></server></servers></settings>' > ~/.m2/settings.xml

      - name: Run mvn depcheck:generate
        run: mvn depcheck:generate -U -B

      - name: Commit and push dep-sha256.json
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add dep-sha256.json

          if ! git diff --cached --quiet; then
            echo "✅ Changes detected — committing dep-sha256.json (re-triggers the pipeline)."
            git commit -m "chore: auto-update dep-sha256.json"
            git push origin HEAD:${{ github.head_ref }}
          else
            echo "ℹ️  dep-sha256.json already aligned — nothing to commit."
          fi